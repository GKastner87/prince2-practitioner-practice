name: Validate practice site

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JavaScript syntax
        run: |
          node --check assets/app.js
          node --check assets/reference-links.js
          node --check assets/enhancements.js
          node --check assets/enhancements-ready.js
          node --check assets/study-session-display.js
          node --check assets/history.js
          node --check assets/history-corrections.js
          node --check foundation/data/hard-foundation-01.js
          node --check foundation/data/hard-foundation-02.js
          node --check foundation/data/hard-foundation-03a.js
          node --check foundation/data/hard-foundation-03b.js
          node --check foundation/data/hard-foundation-03c.js
          node --check foundation/data/hard-foundation-03d.js
          node --check foundation/data/hard-foundation-03e.js
          node --check foundation/data/hard-foundation-04a.js
          node --check foundation/data/hard-foundation-04b.js
          node --check foundation/data/hard-foundation-04c.js
          node --check foundation/data/hard-foundation-04d.js
          node --check foundation/data/hard-foundation-04e.js
          node --check foundation/data/hard-foundation-04f.js
          node --check foundation/data/hard-foundation-05.js
          node --check foundation/foundation.js

      - name: Validate Practitioner questions and references
        run: node tools/validate-exam-data.mjs

      - name: Validate complete Foundation library
        run: node tools/validate-foundation-library.mjs

      - name: Confirm required pages and assets
        run: |
          test -f index.html
          test -f history.html
          test -f references.html
          test -f foundation/index.html
          test -f foundation/foundation.css
          test -f foundation/note-toolbar.css
          test -f foundation/foundation.js
          test -f foundation/data/hard-foundation-01.js
          test -f foundation/data/hard-foundation-02.js
          test -f foundation/data/hard-foundation-03a.js
          test -f foundation/data/hard-foundation-03b.js
          test -f foundation/data/hard-foundation-03c.js
          test -f foundation/data/hard-foundation-03d.js
          test -f foundation/data/hard-foundation-03e.js
          test -f foundation/data/hard-foundation-04a.js
          test -f foundation/data/hard-foundation-04b.js
          test -f foundation/data/hard-foundation-04c.js
          test -f foundation/data/hard-foundation-04d.js
          test -f foundation/data/hard-foundation-04e.js
          test -f foundation/data/hard-foundation-04f.js
          test -f foundation/data/hard-foundation-05.js
          test -f assets/enhancements.css
          grep -q 'note-toolbar.css' foundation/index.html
          grep -q 'assets/enhancements.js' index.html
          grep -q 'history.html' index.html
          grep -q 'foundation/index.html' index.html
          grep -q 'history-corrections.js' history.html
