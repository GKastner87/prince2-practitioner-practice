name: Validate Foundation staging library

on:
  push:
    branches:
      - agent/foundation-library-staging
  pull_request:
    paths:
      - 'src/foundation-library/**'
      - 'tools/validate-foundation-library.mjs'
      - '.github/workflows/validate-foundation-library.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate unpublished Foundation library
        run: node tools/validate-foundation-library.mjs
